version: "3.8"

# Supabase local é gerenciado via CLI.
# Rode: npx supabase start
# Docs: https://supabase.com/docs/guides/local-development

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - apps/api/.env
    environment:
      - NODE_ENV=development

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - apps/web/.env.local
    environment:
      - NODE_ENV=production
